name: cultini
description: "Cultini — a platform connecting people who need help with those who can give it."
publish_to: 'none'

version: 1.0.0

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dartz: ^0.10.1
  shared_preferences: ^2.5.4
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  internet_connection_checker_plus: ^2.9.1+2
  http: ^1.6.0
  connectivity_plus: ^7.0.0
  google_fonts: ^8.0.2
  google_sign_in: ^7.2.0
  flutter_dotenv: ^6.0.0
  app_links: ^7.0.0
  uuid: ^4.5.3
  crypto: ^3.0.3
  device_info_plus: ^12.3.0
  flutter_secure_storage: ^10.0.0
  go_router: ^17.1.0
  image_picker: ^1.2.1
  http_parser: ^4.1.2
  path: ^1.9.1
  flutter_image_compress: ^2.4.0
  photo_view: ^0.15.0
  path_provider: ^2.1.5
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  android: true
  ios: true
  remove_alpha_ios: true
  web:
    generate: true

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

